name: Deploy to Google Apps Script

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write clasp credentials
        run: |
          if [ -z "$CLASPRC_JSON" ]; then
            echo "ERROR: CLASPRC_JSON secret is not set. Add it under Settings → Secrets → Actions."
            exit 1
          fi
          echo "$CLASPRC_JSON" > ~/.clasprc.json
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}

      - name: Push source to Apps Script
        run: clasp push --force
        working-directory: ${{ github.workspace }}

      - name: Redeploy live web app
        if: ${{ secrets.GAS_DEPLOYMENT_ID != '' }}
        run: clasp deploy --deploymentId "$GAS_DEPLOYMENT_ID" --description "GitHub Actions deploy ${GITHUB_SHA}"
        working-directory: ${{ github.workspace }}
        env:
          GAS_DEPLOYMENT_ID: ${{ secrets.GAS_DEPLOYMENT_ID }}
