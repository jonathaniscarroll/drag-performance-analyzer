<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drag Cass-essment</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --paper:    #f5f2eb;
    --paper-2:  #ede9df;
    --ink:      #1a1714;
    --ink-muted:#6b6760;
    --ink-faint:#b0ada8;
    --lilac:    #9b6fb5;
    --lilac-lt: #e8daf2;
    --magenta:  #c44d8a;
    --divider:  #d8d3c8;
    --radius:   4px;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body:    'Work Sans', system-ui, sans-serif;
  }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.6;
    min-height: 100dvh;
  }

  header {
    border-bottom: 1.5px solid var(--divider);
    padding: 1.5rem 2rem;
    display: flex;
    align-items: baseline;
    gap: 1rem;
    flex-wrap: wrap;
    background: var(--paper);
  }
  .logo {
    font-family: var(--font-display);
    font-size: clamp(1.4rem, 3vw, 2rem);
    font-style: italic;
    color: var(--ink);
    letter-spacing: -0.02em;
  }
  .logo span { color: var(--lilac); }
  .tagline {
    font-size: 0.8rem;
    color: var(--ink-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  nav { margin-left: auto; display: flex; gap: 0.5rem; }
  nav button {
    font-family: var(--font-body);
    font-size: 0.8rem;
    padding: 0.35rem 0.9rem;
    border: 1px solid var(--divider);
    border-radius: var(--radius);
    background: transparent;
    color: var(--ink-muted);
    cursor: pointer;
    transition: all 180ms ease;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  nav button.active, nav button:hover {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  main { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  .panel { display: none; }
  .panel.active { display: block; }

  .section-head {
    font-family: var(--font-display);
    font-size: 1.4rem;
    font-style: italic;
    margin-bottom: 0.25rem;
    color: var(--ink);
  }
  .section-sub {
    font-size: 0.8rem;
    color: var(--ink-muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    border-bottom: 1px solid var(--divider);
    padding-bottom: 0.75rem;
  }

  label {
    display: block;
    font-size: 0.75rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 0.3rem;
    margin-top: 1rem;
  }
  input[type="text"], textarea, select {
    width: 100%;
    font-family: var(--font-body);
    font-size: 0.95rem;
    padding: 0.55rem 0.8rem;
    background: var(--paper-2);
    border: 1px solid var(--divider);
    border-radius: var(--radius);
    color: var(--ink);
    transition: border-color 180ms ease;
  }
  input[type="text"]:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--lilac);
  }
  textarea { resize: vertical; min-height: 80px; }

  #dimensions-container { margin: 1.5rem 0; }
  .dim-row {
    background: var(--paper-2);
    border: 1px solid var(--divider);
    border-radius: var(--radius);
    padding: 1rem 1.2rem;
    margin-bottom: 0.75rem;
  }
  .dim-poles {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    color: var(--ink-muted);
    margin-bottom: 0.4rem;
    letter-spacing: 0.03em;
  }
  .dim-poles .pole-a { color: var(--lilac); font-weight: 500; }
  .dim-poles .pole-b { color: var(--magenta); font-weight: 500; }
  .dim-desc {
    font-size: 0.73rem;
    color: var(--ink-faint);
    margin-bottom: 0.6rem;
    font-style: italic;
  }
  .dim-slider {
    -webkit-appearance: none;
    width: 100%;
    height: 3px;
    border-radius: 2px;
    background: linear-gradient(to right, var(--lilac), var(--paper-2), var(--magenta));
    outline: none;
    cursor: pointer;
  }
  .dim-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--ink);
    border: 2px solid var(--paper);
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    cursor: pointer;
    transition: transform 180ms ease;
  }
  .dim-slider::-webkit-slider-thumb:hover { transform: scale(1.15); }
  .dim-val {
    text-align: center;
    font-size: 0.75rem;
    color: var(--ink-muted);
    margin-top: 0.3rem;
  }

  .btn {
    font-family: var(--font-body);
    font-size: 0.82rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.6rem 1.4rem;
    border-radius: var(--radius);
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: all 180ms ease;
    margin-top: 1.2rem;
  }
  .btn-primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .btn-primary:hover { background: #3a3530; }
  .btn-ghost { background: transparent; color: var(--ink-muted); border-color: var(--divider); }
  .btn-ghost:hover { border-color: var(--ink-muted); color: var(--ink); }
  .btn-lilac { background: var(--lilac-lt); color: var(--lilac); border-color: var(--lilac); }
  .btn-lilac:hover { background: var(--lilac); color: #fff; }

  #status {
    margin-top: 1rem;
    font-size: 0.82rem;
    padding: 0.5rem 0.8rem;
    border-radius: var(--radius);
    display: none;
  }
  #status.ok  { background: #e6f4ea; color: #2e6e40; border: 1px solid #b6dfbc; display: block; }
  #status.err { background: #fdecea; color: #8b1a1a; border: 1px solid #f5c2c0; display: block; }

  #archive-list { margin-top: 1.5rem; display: grid; gap: 0.75rem; }
  .arc-card {
    background: var(--paper-2);
    border: 1px solid var(--divider);
    border-radius: var(--radius);
    padding: 1rem 1.2rem;
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    cursor: pointer;
    transition: border-color 180ms ease;
  }
  .arc-card:hover { border-color: var(--lilac); }
  .arc-name { font-family: var(--font-display); font-size: 1.05rem; font-style: italic; }
  .arc-meta { font-size: 0.75rem; color: var(--ink-muted); margin-top: 0.15rem; }
  .arc-id { font-size: 0.65rem; color: var(--ink-faint); margin-left: auto; white-space: nowrap; padding-top: 0.2rem; }

  .dim-manage-row {
    display: grid;
    grid-template-columns: 1fr 1fr 2fr auto;
    gap: 0.5rem;
    align-items: end;
    margin-bottom: 0.75rem;
  }
  .existing-dims { margin: 1.5rem 0; }
  .existing-dim-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    padding: 0.4rem 0;
    border-bottom: 1px solid var(--divider);
    color: var(--ink-muted);
  }
  .existing-dim-item .poles { color: var(--ink); font-weight: 500; }

  .skeleton {
    background: linear-gradient(90deg, var(--paper-2) 25%, var(--divider) 50%, var(--paper-2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s ease-in-out infinite;
    border-radius: var(--radius);
    height: 1em;
    margin-bottom: 0.5rem;
  }
  @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

  @media (max-width: 600px) {
    header { padding: 1rem; }
    main { padding: 1.2rem 1rem 3rem; }
    .dim-manage-row { grid-template-columns: 1fr 1fr; }
    .dim-manage-row input:nth-child(3) { grid-column: 1 / -1; }
    .dim-manage-row button { grid-column: 1 / -1; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">Drag <span>Cass-essment</span></div>
    <div class="tagline">Matrix authoring &amp; performance archive</div>
  </div>
  <nav>
    <button class="active" onclick="showPanel('assess')" data-panel="assess">Assess</button>
    <button onclick="showPanel('archive')" data-panel="archive">Archive</button>
    <button onclick="showPanel('dimensions')" data-panel="dimensions">Dimensions</button>
  </nav>
</header>

<main>

  <div class="panel active" id="panel-assess">
    <h2 class="section-head">New assessment</h2>
    <p class="section-sub">or edit an existing one</p>

    <label for="load-select">Load existing performance to edit</label>
    <select id="load-select" onchange="loadExisting(this.value)">
      <option value="">— start new —</option>
    </select>

    <label for="perf-name">Performance / performer name</label>
    <input type="text" id="perf-name" placeholder="e.g. Viva Las Dragus — Club Nautico Spring 2026">

    <label for="evaluator">Evaluator</label>
    <input type="text" id="evaluator" placeholder="Your name or handle">

    <label for="perf-notes">Notes</label>
    <textarea id="perf-notes" placeholder="Context, impressions, observations…"></textarea>

    <div id="dimensions-container">
      <div class="skeleton" style="height:80px; margin-bottom:.75rem;"></div>
      <div class="skeleton" style="height:80px; margin-bottom:.75rem;"></div>
      <div class="skeleton" style="height:80px;"></div>
    </div>

    <button class="btn btn-primary" onclick="submitForm()">Save assessment</button>
    <button class="btn btn-ghost" onclick="resetForm()" style="margin-left:.5rem;">Clear</button>
    <div id="status"></div>
  </div>

  <div class="panel" id="panel-archive">
    <h2 class="section-head">Archive</h2>
    <p class="section-sub">all saved assessments</p>
    <div id="archive-list"><div class="skeleton" style="height:64px;"></div></div>
  </div>

  <div class="panel" id="panel-dimensions">
    <h2 class="section-head">Manage dimensions</h2>
    <p class="section-sub">author the rubric — edit poles in the linked Google Sheet or add here</p>

    <div class="dim-manage-row">
      <div>
        <label style="margin-top:0;" for="new-pole-a">Pole A</label>
        <input type="text" id="new-pole-a" placeholder="e.g. Control">
      </div>
      <div>
        <label style="margin-top:0;" for="new-pole-b">Pole B</label>
        <input type="text" id="new-pole-b" placeholder="e.g. Letting go">
      </div>
      <div>
        <label style="margin-top:0;" for="new-desc">Description (optional)</label>
        <input type="text" id="new-desc" placeholder="What does this continuum measure?">
      </div>
      <div>
        <label style="margin-top:0;">&nbsp;</label>
        <button class="btn btn-lilac" style="margin-top:0;padding:.55rem 1rem;" onclick="addDimension()">Add</button>
      </div>
    </div>

    <div class="existing-dims" id="existing-dims">
      <div class="skeleton" style="height:1em; margin-bottom:.5rem;"></div>
      <div class="skeleton" style="height:1em; margin-bottom:.5rem;"></div>
      <div class="skeleton" style="height:1em;"></div>
    </div>

    <div id="dim-status"></div>
  </div>

</main>

<script>
var dimensionPairs = [];
var currentArchiveId = null;

function showPanel(name) {
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('nav button').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('panel-' + name).classList.add('active');
  document.querySelector('[data-panel="' + name + '"]').classList.add('active');
  if (name === 'archive') loadArchiveList();
  if (name === 'dimensions') loadDimensionsList();
}

function loadDimensions() {
  google.script.run
    .withSuccessHandler(function(res) {
      if (!res.success) { console.error(res.error); return; }
      dimensionPairs = res.pairs;
      renderSliders();
      renderLoadSelect();
    })
    .withFailureHandler(function(e){ console.error(e); })
    .getDimensionPairs();
}

function renderSliders() {
  var c = document.getElementById('dimensions-container');
  if (!dimensionPairs.length) {
    c.innerHTML = '<p style="color:var(--ink-muted);font-size:.85rem;">No dimensions yet — add some in the Dimensions tab.</p>';
    return;
  }
  c.innerHTML = dimensionPairs.map(function(d) {
    return '<div class="dim-row">' +
      '<div class="dim-poles">' +
        '<span class="pole-a">' + esc(d.poleA) + '</span>' +
        '<span class="pole-b">' + esc(d.poleB) + '</span>' +
      '</div>' +
      (d.description ? '<div class="dim-desc">' + esc(d.description) + '</div>' : '') +
      '<input type="range" class="dim-slider" min="-5" max="5" value="0" data-dim="' + d.index + '" oninput="updateVal(this)">' +
      '<div class="dim-val" id="val-' + d.index + '">0</div>' +
    '</div>';
  }).join('');
}

function updateVal(el) {
  document.getElementById('val-' + el.dataset.dim).textContent = el.value;
}

function renderLoadSelect() {
  google.script.run
    .withSuccessHandler(function(res) {
      if (!res.success) return;
      var sel = document.getElementById('load-select');
      sel.innerHTML = '<option value="">— start new —</option>' +
        res.archives.map(function(a) {
          return '<option value="' + esc(a.archiveId) + '">' + esc(a.archive) + '</option>';
        }).join('');
    })
    .getArchiveOptions();
}

function loadExisting(archiveId) {
  if (!archiveId) { resetForm(); return; }
  google.script.run
    .withSuccessHandler(function(res) {
      if (!res.success) { alert(res.error); return; }
      var a = res.archive;
      currentArchiveId = a.archiveId;
      document.getElementById('perf-name').value = a.archiveName || '';
      document.getElementById('evaluator').value = a.evaluator || '';
      document.getElementById('perf-notes').value = a.archiveNotes || '';
      document.querySelectorAll('.dim-slider').forEach(function(sl) {
        var idx = parseInt(sl.dataset.dim, 10);
        var v = a.responses && a.responses[idx] !== undefined ? a.responses[idx] : 0;
        sl.value = v;
        document.getElementById('val-' + idx).textContent = v;
      });
    })
    .getArchiveById(archiveId);
}

function submitForm() {
  var name = document.getElementById('perf-name').value.trim();
  if (!name) { showStatus('Performance name is required.', 'err'); return; }
  var responses = dimensionPairs.map(function(d) {
    var sl = document.querySelector('[data-dim="' + d.index + '"]');
    return { dimensionIndex: d.index, value: sl ? parseInt(sl.value, 10) : 0 };
  });
  var data = {
    archiveName: name,
    archiveNotes: document.getElementById('perf-notes').value.trim(),
    evaluator: document.getElementById('evaluator').value.trim(),
    responses: responses
  };
  if (currentArchiveId) {
    data.archiveId = currentArchiveId;
    google.script.run.withSuccessHandler(onSave).withFailureHandler(onErr).updateArchiveAssessment(data);
  } else {
    google.script.run.withSuccessHandler(onSave).withFailureHandler(onErr).submitAssessment(data);
  }
}

function onSave(res) {
  if (!res.success) { showStatus('Error: ' + res.error, 'err'); return; }
  showStatus('Saved — ID: ' + res.archiveId, 'ok');
  resetForm();
  renderLoadSelect();
}
function onErr(e) { showStatus('Script error: ' + String(e), 'err'); }

function resetForm() {
  currentArchiveId = null;
  document.getElementById('perf-name').value = '';
  document.getElementById('evaluator').value = '';
  document.getElementById('perf-notes').value = '';
  document.getElementById('load-select').value = '';
  document.querySelectorAll('.dim-slider').forEach(function(sl) {
    sl.value = 0;
    document.getElementById('val-' + sl.dataset.dim).textContent = '0';
  });
  var s = document.getElementById('status');
  s.className = '';
  s.style.display = 'none';
}

function showStatus(msg, cls) {
  var el = document.getElementById('status');
  el.textContent = msg;
  el.className = cls;
}

function loadArchiveList() {
  google.script.run
    .withSuccessHandler(function(res) {
      var list = document.getElementById('archive-list');
      if (!res.success || !res.responses.length) {
        list.innerHTML = '<p style="color:var(--ink-muted);font-size:.85rem;">No assessments saved yet.</p>';
        return;
      }
      list.innerHTML = res.responses.map(function(r) {
        var date = r.timestamp ? new Date(r.timestamp).toLocaleDateString('en-CA', {year:'numeric',month:'short',day:'numeric'}) : '';
        return '<div class="arc-card" onclick="goEdit(\'' + esc(r.archiveId) + '\')">' +
          '<div>' +
            '<div class="arc-name">' + esc(r.archive) + '</div>' +
            '<div class="arc-meta">' + (r.evaluator ? esc(r.evaluator) + ' · ' : '') + date + '</div>' +
          '</div>' +
          '<div class="arc-id">' + esc(r.archiveId) + '</div>' +
        '</div>';
      }).join('');
    })
    .getAllResponses();
}

function goEdit(archiveId) {
  showPanel('assess');
  document.getElementById('load-select').value = archiveId;
  loadExisting(archiveId);
}

function loadDimensionsList() {
  var c = document.getElementById('existing-dims');
  c.innerHTML = '<div class="skeleton" style="height:1em;margin-bottom:.5rem;"></div><div class="skeleton" style="height:1em;"></div>';
  google.script.run
    .withSuccessHandler(function(res) {
      if (!res.success || !res.pairs.length) {
        c.innerHTML = '<p style="color:var(--ink-muted);font-size:.85rem;">No dimensions defined yet.</p>';
        return;
      }
      c.innerHTML = '<p style="font-size:.75rem;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:.75rem;">Current continua (' + res.pairs.length + ')</p>' +
        res.pairs.map(function(d, i) {
          return '<div class="existing-dim-item">' +
            '<span style="color:var(--ink-faint);font-size:.7rem;">' + (i+1) + '</span>' +
            '<span class="poles">' + esc(d.poleA) + ' ↔ ' + esc(d.poleB) + '</span>' +
            (d.description ? '<span style="color:var(--ink-faint);font-size:.75rem;font-style:italic;">— ' + esc(d.description) + '</span>' : '') +
          '</div>';
        }).join('');
    })
    .getDimensionPairs();
}

function addDimension() {
  var a = document.getElementById('new-pole-a').value.trim();
  var b = document.getElementById('new-pole-b').value.trim();
  var d = document.getElementById('new-desc').value.trim();
  if (!a || !b) { dimStatus('Both poles are required.', 'err'); return; }
  google.script.run
    .withSuccessHandler(function(res) {
      if (!res.success) { dimStatus(res.error, 'err'); return; }
      dimStatus('Continuum added.', 'ok');
      document.getElementById('new-pole-a').value = '';
      document.getElementById('new-pole-b').value = '';
      document.getElementById('new-desc').value = '';
      loadDimensionsList();
      loadDimensions();
    })
    .withFailureHandler(function(e){ dimStatus(String(e), 'err'); })
    .addDimensionPair(a, b, d);
}

function dimStatus(msg, cls) {
  var el = document.getElementById('dim-status');
  el.textContent = msg;
  el.style.cssText = 'display:block;padding:.5rem .8rem;border-radius:4px;font-size:.82rem;margin-top:1rem;background:' +
    (cls === 'ok' ? '#e6f4ea;color:#2e6e40;border:1px solid #b6dfbc' : '#fdecea;color:#8b1a1a;border:1px solid #f5c2c0') + ';';
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

window.addEventListener('load', loadDimensions);
</script>
</body>
</html>
