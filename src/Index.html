<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drag Performance Analyzer</title>
  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700&f[]=zodiak@400,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0a12;
      --surface: #1a1222;
      --surface-2: #221830;
      --border: rgba(200,160,255,0.12);
      --text: #f0e8ff;
      --text-muted: #a89bc2;
      --accent: #c770f0;
      --accent-2: #f070c0;
      --gold: #f0c040;
      --radius: 0.75rem;
      --font-display: 'Zodiak', Georgia, serif;
      --font-body: 'Cabinet Grotesk', 'Helvetica Neue', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 1rem;
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    /* --- Header --- */
    header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header h1 {
      font-family: var(--font-display);
      font-size: clamp(1.25rem, 3vw, 2rem);
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header .subtitle { font-size: 0.875rem; color: var(--text-muted); }

    /* --- Nav Tabs --- */
    nav {
      display: flex;
      gap: 0.25rem;
      padding: 0 2rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    nav button {
      padding: 0.75rem 1.25rem;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 0.875rem;
      cursor: pointer;
      transition: color 0.18s, border-color 0.18s;
    }
    nav button.active, nav button:hover {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* --- Main --- */
    main { padding: 2rem; max-width: 1100px; margin: 0 auto; width: 100%; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* --- Cards --- */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .card h2 {
      font-family: var(--font-display);
      font-size: 1.25rem;
      margin-bottom: 1rem;
      color: var(--accent);
    }

    /* --- Score Bar --- */
    .score-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem; }
    .score-label { font-size: 0.8rem; color: var(--text-muted); width: 100px; flex-shrink: 0; }
    .score-bar-bg { flex: 1; height: 6px; background: var(--surface-2); border-radius: 99px; overflow: hidden; }
    .score-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); border-radius: 99px; transition: width 0.4s ease; }
    .score-value { font-size: 0.8rem; color: var(--gold); width: 2rem; text-align: right; }

    /* --- Form --- */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
    .form-group { display: flex; flex-direction: column; gap: 0.35rem; }
    .form-group label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .form-group input, .form-group select, .form-group textarea {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 0.6rem 0.75rem;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.95rem;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }
    .form-group input[type="range"] { padding: 0; accent-color: var(--accent); }
    .slider-group { display: flex; flex-direction: column; gap: 0.35rem; }
    .slider-row { display: flex; align-items: center; gap: 0.75rem; }
    .slider-row label { font-size: 0.8rem; color: var(--text-muted); width: 110px; flex-shrink: 0; }
    .slider-row input[type="range"] { flex: 1; accent-color: var(--accent); }
    .slider-row .val { font-size: 0.8rem; color: var(--gold); width: 1.5rem; text-align: right; }

    .btn {
      padding: 0.65rem 1.5rem;
      border-radius: 0.5rem;
      border: none;
      font-family: var(--font-body);
      font-size: 0.95rem;
      cursor: pointer;
      transition: opacity 0.18s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    /* --- Archive Table --- */
    .archive-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    .archive-table th { text-align: left; padding: 0.6rem 0.75rem; color: var(--text-muted); font-weight: 500; border-bottom: 1px solid var(--border); }
    .archive-table td { padding: 0.6rem 0.75rem; border-bottom: 1px solid rgba(200,160,255,0.06); }
    .archive-table tr:hover td { background: var(--surface-2); }

    /* --- State --- */
    .loading { color: var(--text-muted); font-size: 0.9rem; padding: 2rem 0; text-align: center; }
    .empty { color: var(--text-muted); font-size: 0.9rem; padding: 2rem 0; text-align: center; }
    .status { padding: 0.5rem 0.75rem; border-radius: 0.5rem; font-size: 0.85rem; margin-top: 0.75rem; display: none; }
    .status.success { background: rgba(100,220,130,0.12); color: #6ddf80; display: block; }
    .status.error { background: rgba(220,60,80,0.12); color: #f07080; display: block; }

    footer { padding: 1rem 2rem; text-align: center; font-size: 0.75rem; color: var(--text-muted); border-top: 1px solid var(--border); }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>✦ Drag Performance Analyzer</h1>
      <p class="subtitle">Score · Archive · Analyze drag performances</p>
    </div>
  </header>

  <nav>
    <button class="active" onclick="switchTab('score')">Score</button>
    <button onclick="switchTab('archive')">Archive</button>
    <button onclick="switchTab('analysis')">Analysis</button>
  </nav>

  <main>
    <!-- SCORE TAB -->
    <div id="tab-score" class="tab-panel active">
      <div class="card">
        <h2>Log a Performance</h2>
        <div class="form-grid">
          <div class="form-group">
            <label>Performer Name</label>
            <input type="text" id="performer" placeholder="e.g. Crystal Methyd">
          </div>
          <div class="form-group">
            <label>Song</label>
            <input type="text" id="song" placeholder="e.g. Bitch I'm Madonna">
          </div>
          <div class="form-group">
            <label>Category</label>
            <select id="category">
              <option value="">Select category...</option>
            </select>
          </div>
          <div class="form-group">
            <label>Aesthetic</label>
            <input type="text" id="aesthetic" placeholder="e.g. campy horror glam">
          </div>
        </div>

        <div class="card" style="margin-top:1rem; background: var(--surface-2);">
          <h2 style="font-size:1rem; color: var(--text-muted);">C·U·N·T Scores (1–10)</h2>
          <div class="slider-group">
            <div class="slider-row"><label>Charisma</label><input type="range" id="s-charisma" min="1" max="10" value="5" oninput="updateVal(this,'v-charisma')"><span class="val" id="v-charisma">5</span></div>
            <div class="slider-row"><label>Uniqueness</label><input type="range" id="s-unique" min="1" max="10" value="5" oninput="updateVal(this,'v-unique')"><span class="val" id="v-unique">5</span></div>
            <div class="slider-row"><label>Nerve</label><input type="range" id="s-nerve" min="1" max="10" value="5" oninput="updateVal(this,'v-nerve')"><span class="val" id="v-nerve">5</span></div>
            <div class="slider-row"><label>Talent</label><input type="range" id="s-talent" min="1" max="10" value="5" oninput="updateVal(this,'v-talent')"><span class="val" id="v-talent">5</span></div>
          </div>
        </div>

        <div class="form-group" style="margin-top:1rem;">
          <label>Notes</label>
          <textarea id="notes" rows="3" placeholder="Costume details, standout moments, lip sync accuracy..."></textarea>
        </div>

        <div style="margin-top:1rem; display:flex; gap:0.75rem;">
          <button class="btn btn-primary" onclick="submitPerformance()">Log Performance</button>
          <button class="btn btn-ghost" onclick="resetForm()">Reset</button>
        </div>
        <div id="submit-status" class="status"></div>
      </div>
    </div>

    <!-- ARCHIVE TAB -->
    <div id="tab-archive" class="tab-panel">
      <div class="card">
        <h2>Performance Archive</h2>
        <div id="archive-container" class="loading">Loading performances...</div>
      </div>
    </div>

    <!-- ANALYSIS TAB -->
    <div id="tab-analysis" class="tab-panel">
      <div class="card">
        <h2>Score Breakdown</h2>
        <div id="analysis-container" class="loading">Loading analysis...</div>
      </div>
    </div>
  </main>

  <footer>Drag Performance Analyzer · Backed by Google Sheets</footer>

  <script>
    let performances = [];
    let activeTab = 'score';

    function switchTab(tab) {
      activeTab = tab;
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      event.currentTarget.classList.add('active');
      if (tab === 'archive') loadArchive();
      if (tab === 'analysis') loadAnalysis();
    }

    function updateVal(slider, valId) {
      document.getElementById(valId).textContent = slider.value;
    }

    // Load categories from server
    google.script.run
      .withSuccessHandler(function(cats) {
        const sel = document.getElementById('category');
        cats.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c; opt.textContent = c;
          sel.appendChild(opt);
        });
      })
      .getCategories();

    function submitPerformance() {
      const data = {
        performer: document.getElementById('performer').value,
        song: document.getElementById('song').value,
        category: document.getElementById('category').value,
        aesthetic: document.getElementById('aesthetic').value,
        charismaScore: +document.getElementById('s-charisma').value,
        uniquenessScore: +document.getElementById('s-unique').value,
        nervosityScore: +document.getElementById('s-nerve').value,
        talentScore: +document.getElementById('s-talent').value,
        technicalScore: 0,
        notes: document.getElementById('notes').value
      };
      if (!data.performer || !data.category) {
        showStatus('error', 'Performer name and category are required.');
        return;
      }
      google.script.run
        .withSuccessHandler(function(res) {
          if (res.success) { showStatus('success', 'Performance logged!'); resetForm(); }
          else showStatus('error', 'Error: ' + (res.error || 'unknown'));
        })
        .withFailureHandler(function(err) { showStatus('error', err.message); })
        .addPerformance(data);
    }

    function resetForm() {
      ['performer','song','aesthetic','notes'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('category').value = '';
      ['s-charisma','s-unique','s-nerve','s-talent'].forEach((id,i) => {
        document.getElementById(id).value = 5;
        document.getElementById(['v-charisma','v-unique','v-nerve','v-talent'][i]).textContent = 5;
      });
    }

    function showStatus(type, msg) {
      const el = document.getElementById('submit-status');
      el.className = 'status ' + type;
      el.textContent = msg;
      setTimeout(() => el.style.display = 'none', 4000);
    }

    function loadArchive() {
      const container = document.getElementById('archive-container');
      container.innerHTML = '<div class="loading">Loading...</div>';
      google.script.run
        .withSuccessHandler(function(data) {
          performances = data;
          if (!data.length) { container.innerHTML = '<div class="empty">No performances logged yet.</div>'; return; }
          const table = document.createElement('table');
          table.className = 'archive-table';
          table.innerHTML = `<thead><tr>
            <th>Performer</th><th>Song</th><th>Category</th><th>Aesthetic</th>
            <th>C</th><th>U</th><th>N</th><th>T</th><th>Total</th>
          </tr></thead>`;
          const tbody = document.createElement('tbody');
          data.forEach(p => {
            const total = (+p.charismaScore + +p.uniquenessScore + +p.nervosityScore + +p.talentScore);
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${p.performer}</td><td>${p.song}</td><td>${p.category}</td><td>${p.aesthetic}</td>
              <td>${p.charismaScore}</td><td>${p.uniquenessScore}</td><td>${p.nervosityScore}</td><td>${p.talentScore}</td>
              <td style="color:var(--gold);font-weight:700">${total}</td>`;
            tbody.appendChild(tr);
          });
          table.appendChild(tbody);
          container.innerHTML = '';
          container.appendChild(table);
        })
        .withFailureHandler(function() { container.innerHTML = '<div class="empty">Could not load archive.</div>'; })
        .getPerformances();
    }

    function loadAnalysis() {
      const container = document.getElementById('analysis-container');
      if (!performances.length) {
        container.innerHTML = '<div class="empty">Log some performances first, then come back here.</div>';
        return;
      }
      const totals = { charismaScore:0, uniquenessScore:0, nervosityScore:0, talentScore:0 };
      performances.forEach(p => {
        Object.keys(totals).forEach(k => totals[k] += +p[k]);
      });
      const n = performances.length;
      const avgs = Object.fromEntries(Object.entries(totals).map(([k,v]) => [k, (v/n).toFixed(1)]));
      const labels = { charismaScore:'Charisma', uniquenessScore:'Uniqueness', nervosityScore:'Nerve', talentScore:'Talent' };
      container.innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:1rem">' + n + ' performances logged</p>' +
        Object.entries(avgs).map(([k,v]) => `
          <div class="score-row">
            <span class="score-label">${labels[k]}</span>
            <div class="score-bar-bg"><div class="score-bar-fill" style="width:${v*10}%"></div></div>
            <span class="score-value">${v}</span>
          </div>`).join('');
    }
  </script>
</body>
</html>
